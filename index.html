<!DOCTYPE html>
<html>
<head>
<title>Mini CRM Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#667eea,#764ba2);
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2{
text-align:center;
}

input,select{
padding:10px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#333;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
text-align:center;
}

.status-new{
color:blue;
font-weight:bold;
}

.status-contacted{
color:orange;
font-weight:bold;
}

.status-converted{
color:green;
font-weight:bold;
}

.delete{
background:red;
}

.delete:hover{
background:darkred;
}

</style>

</head>

<body>

<header>
<h1><i class="fa-solid fa-users"></i> Client Lead Management System</h1>
</header>

<div class="container">

<h2>Add New Lead</h2>

<input id="name" placeholder="Client Name">

<input id="email" placeholder="Email">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>

<button onclick="addLead()">
<i class="fa fa-plus"></i> Add Lead
</button>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Delete</th>
</tr>

<tbody id="leadTable"></tbody>

</table>

</div>

<script>
let leads = JSON.parse(localStorage.getItem("leads")) || [
{name:"Minha Fathima", email:"minha@email.com", status:"New"},
{name:"Nuha Fathima", email:"nuha@email.com", status:"Contacted"},
{name:"Zuha Fathima", email:"zuha@email.com", status:"Converted"},
{name:"Aaina Mariyam", email:"aaina@email.com", status:"New"},
{name:"Mohammed Sahal", email:"sahal@email.com", status:"Contacted"}
];

displayLeads();

function addLead(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let status=document.getElementById("status").value;

if(name=="" || email==""){
alert("Please fill all fields");
return;
}

leads.push({name,email,status});

localStorage.setItem("leads",JSON.stringify(leads));

displayLeads();

}

function displayLeads(){

let data="";

for(let i=0;i<leads.length;i++){

let color="status-new";

if(leads[i].status=="Contacted"){
color="status-contacted";
}

if(leads[i].status=="Converted"){
color="status-converted";
}

data+=`
<tr>
<td>${leads[i].name}</td>
<td>${leads[i].email}</td>
<td class="${color}">${leads[i].status}</td>
<td>
<button class="delete" onclick="deleteLead(${i})">
<i class="fa fa-trash"></i>
</button>
</td>
</tr>
`;

}

document.getElementById("leadTable").innerHTML=data;

}

function deleteLead(i){

leads.splice(i,1);

localStorage.setItem("leads",JSON.stringify(leads));

displayLeads();

}

</script>

</body>
</html>
